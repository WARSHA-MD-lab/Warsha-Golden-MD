<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arslan MD · Pair Code</title>
  <!-- Google Font & Font Awesome for icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    /* ----- RESET & BASE ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0b0b0e;
      padding: 1.5rem;
    }

    /* ----- MAIN CARD (GLASS / DARK) ----- */
    .card {
      width: 100%;
      max-width: 440px;
      background: rgba(10, 10, 14, 0.85);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border-radius: 40px;
      padding: 2.2rem 1.8rem 2rem;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.03);
      transition: all 0.3s;
    }

    /* ----- RAINBOW TEXT (ANIMATED) ----- */
    .rgb-text {
      background: linear-gradient(90deg, #ff4d6d, #ffb347, #f9d342, #5fdc7a, #4db8ff, #b47bff, #ff6fcf, #ff4d6d);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: rgbFlow 6s linear infinite;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    @keyframes rgbFlow {
      0% { background-position: 0% 50%; }
      100% { background-position: 300% 50%; }
    }

    /* ----- TITLES ----- */
    .main-title {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 0.15rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
    }
    .main-title i {
      -webkit-text-fill-color: initial;
      color: #fbbf24;
      font-size: 1.8rem;
    }
    .sub-title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-top: -0.2rem;
      margin-bottom: 0.7rem;
      letter-spacing: -0.01em;
    }

    .status-label {
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      opacity: 0.8;
      margin: 0.8rem 0 1rem;
    }

    /* ----- INPUT CONTAINER (RGB BORDER) ----- */
    .rgb-container {
      padding: 2.5px;
      border-radius: 20px;
      background: linear-gradient(90deg, #ff4d6d, #ffb347, #f9d342, #5fdc7a, #4db8ff, #b47bff, #ff6fcf, #ff4d6d);
      background-size: 250% 100%;
      width: 100%;
      max-width: 340px;
      margin: 0 auto 1.1rem auto;
      transition: all 0.2s;
      box-shadow: 0 0 15px rgba(255, 100, 150, 0.1);
    }

    /* Direction variants */
    .move-right {
      animation: scrollRight 5s linear infinite;
    }
    .move-left {
      animation: scrollLeft 5s linear infinite;
    }

    @keyframes scrollRight {
      0% { background-position: 0% 50%; }
      100% { background-position: 250% 50%; }
    }
    @keyframes scrollLeft {
      0% { background-position: 0% 50%; }
      100% { background-position: -250% 50%; }
    }

    /* Inner box (black) */
    .inner-box {
      background: #0b0b0e;
      border-radius: 18px;
      width: 100%;
      padding: 14px 18px;
      border: none;
      outline: none;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      color: #f1f1f5;
      text-align: center;
      transition: 0.15s;
      letter-spacing: 0.3px;
    }

    .inner-box::placeholder {
      color: #55585e;
      font-weight: 400;
      letter-spacing: 0.2px;
    }

    /* Button inner */
    .btn-inner {
      background: #0b0b0e;
      border-radius: 18px;
      width: 100%;
      padding: 14px 18px;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: #ffffff;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: 0.3px;
    }

    .btn-inner i {
      font-size: 1.1rem;
      color: #b47bff;
    }

    .rgb-container button {
      background: transparent;
      border: none;
      width: 100%;
      padding: 0;
      cursor: pointer;
    }

    .rgb-container button:hover .btn-inner {
      background: #14141a;
    }
    .rgb-container button:active .btn-inner {
      transform: scale(0.98);
    }

    /* ----- RESULT BOX (RGB BORDER) ----- */
    .result-box {
      width: 100%;
      max-width: 340px;
      margin: 1.2rem auto 0.5rem;
      padding: 2.5px;
      border-radius: 20px;
      background: linear-gradient(90deg, #ff4d6d, #ffb347, #f9d342, #5fdc7a, #4db8ff, #b47bff, #ff6fcf, #ff4d6d);
      background-size: 300% 100%;
      animation: scrollRight 6s linear infinite;
      display: none; /* hidden by default, shown via JS */
    }

    .result-inner {
      background: #0b0b0e;
      border-radius: 18px;
      padding: 16px 10px;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f1f1f5;
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      word-break: break-word;
    }

    #codeBox {
      cursor: default;
      transition: 0.2s;
      font-feature-settings: "tnum";
    }

    /* ----- FOOTER & META ----- */
    .footer-meta {
      margin-top: 1.8rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem 1.2rem;
      font-size: 0.7rem;
      font-weight: 400;
      color: #5a5e67;
      letter-spacing: 0.3px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      padding-top: 1.4rem;
    }
    .footer-meta span {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .footer-meta i {
      color: #7b7f8a;
      font-size: 0.7rem;
    }

    .badge {
      background: rgba(255, 255, 255, 0.03);
      padding: 0.25rem 1rem;
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      font-size: 0.65rem;
      font-weight: 500;
      color: #9ea2ae;
    }

    /* ----- RESPONSIVE FINE-TUNE ----- */
    @media (max-width: 480px) {
      .card { padding: 1.8rem 1.2rem; }
      .main-title { font-size: 1.8rem; }
      .sub-title { font-size: 1.3rem; }
      .inner-box { font-size: 0.95rem; padding: 12px 14px; }
      .btn-inner { font-size: 0.95rem; padding: 12px 14px; }
    }

    /* loading spinner inside result */
    .loader-dots::after {
      content: '...';
      animation: dots 1.2s steps(3, end) infinite;
      display: inline-block;
      width: 1.2rem;
      text-align: left;
    }
    @keyframes dots {
      0% { content: ''; }
      33% { content: '.'; }
      66% { content: '..'; }
      100% { content: '...'; }
    }

    /* extra glow for result */
    .result-box.glow {
      box-shadow: 0 0 25px rgba(180, 123, 255, 0.15);
    }

    /* small icon inside input */
    .input-icon {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .input-icon i {
      position: absolute;
      left: 18px;
      color: #4d515a;
      font-size: 1rem;
      pointer-events: none;
    }
    .input-icon .inner-box {
      padding-left: 2.8rem;
    }
  </style>
</head>
<body>
  <div class="card">

    <!-- TITLE -->
    <div class="main-title">
      <i class="fas fa-crown"></i>
      <span class="rgb-text">Arslan MD</span>
    </div>
    <div class="sub-title rgb-text">PAIR CODE</div>

    <!-- STATUS -->
    <div class="status-label rgb-text">
      <i class="fas fa-phone-alt" style="margin-right: 6px; -webkit-text-fill-color: initial; color: #b47bff;"></i>
      ENTER WHATSAPP NUMBER
    </div>

    <!-- INPUT BOX (move-right) -->
    <div class="rgb-container move-right">
      <div class="input-icon">
        <i class="fas fa-plus-circle"></i>
        <input type="text" id="number" class="inner-box" placeholder="923237045919" value="923237045919" />
      </div>
    </div>

    <!-- BUTTON (move-left) -->
    <div class="rgb-container move-left" style="margin-top: 0.2rem;">
      <button onclick="getCode()">
        <div class="btn-inner">
          <i class="fas fa-link"></i> GET PAIR CODE
        </div>
      </button>
    </div>

    <!-- RESULT BOX (move-right) -->
    <div class="result-box move-right" id="borderBox">
      <div class="result-inner" id="codeBox">----</div>
    </div>

    <!-- extra status -->
    <div style="margin-top: 1.2rem;">
      <span class="badge"><i class="fas fa-robot" style="margin-right: 5px;"></i> WHATSAPP BOT</span>
      <span class="badge" style="margin-left: 4px;"><i class="fas fa-code"></i> ARSLAN-MD</span>
    </div>
    <div style="margin-top: 0.5rem; font-size: 0.7rem; color: #4d515a; letter-spacing: 0.2px;">
      <i class="fas fa-bolt" style="color: #fbbf24; margin-right: 4px;"></i> MINI BOT EDITION · 2026
    </div>

    <!-- FOOTER -->
    <div class="footer-meta">
      <span><i class="fas fa-shield-alt"></i> secure</span>
      <span><i class="fas fa-bolt"></i> instant</span>
      <span><i class="fas fa-sync-alt"></i> v2.0</span>
      <span><i class="fas fa-crown" style="color: #fbbf24;"></i> Arslan</span>
    </div>
  </div>

  <script>
    // ----- CORE LOGIC (unchanged structure, only enhanced UX) -----
    async function getCode() {
      const numInput = document.getElementById("number");
      const codeBox = document.getElementById("codeBox");
      const borderBox = document.getElementById("borderBox");

      // clean number: only digits
      const num = numInput.value.replace(/[^0-9]/g, '');

      // if empty
      if (!num) {
        borderBox.style.display = "block";
        codeBox.style.letterSpacing = "normal";
        codeBox.style.color = "#ff6f8a";
        codeBox.style.fontWeight = "500";
        codeBox.innerText = "⏳ Enter your WhatsApp number";
        return;
      }

      // loading state
      borderBox.style.display = "block";
      codeBox.style.letterSpacing = "normal";
      codeBox.style.color = "#bdbfff";
      codeBox.style.fontWeight = "500";
      codeBox.innerHTML = '<span class="loader-dots">Connecting</span>';

      try {
        const res = await fetch(`/code?number=${num}`);
        const data = await res.json();

        if (data.code) {
          codeBox.style.letterSpacing = "4px";
          codeBox.style.color = "#ffffff";
          codeBox.style.fontWeight = "600";
          codeBox.innerText = data.code;
          // optional: copy hint
        } else {
          codeBox.style.letterSpacing = "normal";
          codeBox.style.color = "#ff8a9b";
          codeBox.style.fontWeight = "500";
          codeBox.innerText = "⚠️ Server busy, try again";
        }
      } catch (error) {
        codeBox.style.letterSpacing = "normal";
        codeBox.style.color = "#ff8a9b";
        codeBox.style.fontWeight = "500";
        codeBox.innerText = "⛔ Server unreachable";
      }
    }

    // optional: if user hits Enter in input
    document.getElementById("number").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        e.preventDefault();
        getCode();
      }
    });

    // auto-focus
    window.addEventListener('load', function() {
      const input = document.getElementById('number');
      input.focus();
      input.setSelectionRange(input.value.length, input.value.length);
    });

    // for demo: if the number field has default value, we can show a quick hint
    // but we keep it clean.
  </script>
</body>
</html>
